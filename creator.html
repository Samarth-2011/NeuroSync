<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator | NeuroSync</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background:
        linear-gradient(rgba(5,10,25,0.82), rgba(5,10,25,0.92)),
        url('hero-bg.png');
      background-size: cover;
      background-position: center;
      color: white;
    }

    creator-section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
  box-sizing: border-box;
}
    .creator-card {
      max-width: 850px;
      padding: 60px 50px;

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(0,255,255,0.25);

      border-radius: 30px;
      backdrop-filter: blur(18px);

      box-shadow: 0 0 35px rgba(0,255,255,0.12);
    }

    .creator-card h1 {
      font-size: 64px;
      margin-bottom: 10px;
      color: white;
      text-shadow: 0 0 18px rgba(0,255,255,0.35);
    }

    .creator-card h2 {
      font-size: 34px;
      color: cyan;
      margin-bottom: 25px;
    }

    .creator-card p {
      font-size: 22px;
      line-height: 1.9;
      color: #dbeafe;
    }

    .back-home {
      display: inline-block;
      margin-top: 30px;
      padding: 16px 34px;
      border-radius: 40px;
      text-decoration: none;
      color: white;

      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.25);

      backdrop-filter: blur(10px);
      transition: 0.35s ease;
    }

    .back-home:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>

<section class="creator-section">
  <div class="creator-card">

    <h1>Created By</h1>

    <h2>Aaditya Tayal</h2>

    <p>
      Class 11<sup>th</sup> Student<br>
      Modern Convent School<br>
      Dwarka Sector 4, New Delhi
    </p>

    <p>
      Visionary creator behind NeuroSync — Smart School 2040,<br>
      reimagining the future of education through AI, VR, and Brain Sync innovation.
    </p>

    <a href="index.html" class="back-home">⬅ Back To Home</a>

  </div>
</section>
</body>
</html>
